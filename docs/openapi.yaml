openapi: 3.0.3
info:
  title: captain — 活动互动平台 API
  version: "0.1.0"
  description: >
    三接口域：participation(/api/v1/p, 匿名+device-session)、organizer
    (/api/v1/org, Bearer)、admin(/api/v1/{adminSlug}, Bearer, 路径混淆 T-083)。
    管理路径段由 /api/v1/p/config 暴露；此处占位用 "admin"。
servers:
  - url: /
tags: [participation, organizer, admin]

components:
  securitySchemes:
    bearer: { type: http, scheme: bearer }
    deviceSession: { type: apiKey, in: cookie, name: cap_sess }
  schemas:
    Error: { type: object, properties: { code: {type: string}, message: {type: string} } }
    CountSnapshot:
      type: object
      properties: { event_id: {type: string}, count: {type: integer}, ts: {type: integer} }
    EventInfo:
      type: object
      properties:
        id: {type: string}
        organizer_id: {type: string}
        name: {type: string}
        status: {type: string, enum: [draft, active, ended]}
        start_at: {type: string, format: date-time}
        end_at: {type: string, format: date-time}
        expected_count: {type: integer}
        screen_template_code: {type: string}
        flow_config_id: {type: string}
    SubmitBody:
      type: object
      description: 步骤提交；按 step 类型取字段。REQ-CHANGE-001/002/004 可选字段。
      properties:
        fields: {type: object, additionalProperties: true}
        answer: {type: integer}
        pledge: {type: boolean}
        participant_type: {type: string, enum: [staff, external]}
        fingerprint: {type: object, additionalProperties: true}
        name: {type: string}
        employee_number: {type: string}
        phone_last4: {type: string}
        turnstile_token: {type: string}
        geo:
          type: object
          properties: { lat: {type: number}, lng: {type: number}, accuracy: {type: number} }

paths:
  /healthz:
    get: { tags: [participation], summary: 健康检查, responses: { "200": { description: ok } } }

  /api/v1/p/config:
    get:
      tags: [participation]
      summary: 公开运行时配置（Turnstile sitekey/mode）
      responses: { "200": { description: ok } }

  /api/v1/p/e/{event_id}:
    get:
      tags: [participation]
      summary: 扫码落地：校验 event_token，签发 device-session，返回 event+flow
      parameters:
        - { name: event_id, in: path, required: true, schema: {type: string} }
        - { name: et, in: query, required: true, schema: {type: string}, description: 静态二维码 event_token }
        - { name: d, in: query, required: true, schema: {type: string}, description: 设备 uuid }
      responses:
        "200": { description: ok }
        "401": { description: bad_event_token }
        "403": { description: event_inactive }

  /api/v1/p/e/{event_id}/steps/{step_id}/submit:
    post:
      tags: [participation]
      summary: 提交流程步骤（checkin/form/game/charity/reward/result）
      security: [{ deviceSession: [] }]
      parameters:
        - { name: event_id, in: path, required: true, schema: {type: string} }
        - { name: step_id, in: path, required: true, schema: {type: string} }
      requestBody:
        content: { application/json: { schema: { $ref: "#/components/schemas/SubmitBody" } } }
      responses:
        "200": { description: ok }
        "401": { description: no_session }
        "403": { description: "captcha_failed / 白名单校验未通过(STAFF_NOT_IN_WHITELIST/PHONE_MISMATCH/ENTRY_CLAIMED_ELSEWHERE/ENTRY_BLOCKED)" }
        "429": { description: rate_limited }

  /api/v1/p/e/{event_id}/count:
    get:
      tags: [participation]
      summary: 当前签到计数快照
      parameters: [{ name: event_id, in: path, required: true, schema: {type: string} }]
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/CountSnapshot" } } } } }

  /api/v1/p/e/{event_id}/info:
    get:
      tags: [participation]
      summary: 公开活动元信息（name/expected_count，驱动大屏进度）
      parameters: [{ name: event_id, in: path, required: true, schema: {type: string} }]
      responses: { "200": { description: ok } }

  /api/v1/p/e/{event_id}/qr:
    get:
      tags: [participation]
      summary: 扫码签到二维码 PNG（按请求域名+活动ID生成入场链接）
      parameters: [{ name: event_id, in: path, required: true, schema: {type: string} }]
      responses: { "200": { description: "image/png" } }

  /api/v1/p/e/{event_id}/stream:
    get:
      tags: [participation]
      summary: SSE 实时计数（text/event-stream，≤2/s 节流）
      parameters: [{ name: event_id, in: path, required: true, schema: {type: string} }]
      responses: { "200": { description: "event-stream of CountSnapshot" } }

  /api/v1/org/login:
    post:
      tags: [organizer]
      summary: 活动方登录（恒定 3s 延迟 + 10 次失败锁定 10 分钟 + 可选 Turnstile）
      requestBody:
        content: { application/json: { schema: { type: object, properties: { login_name: {type: string}, password: {type: string}, turnstile_token: {type: string} } } } }
      responses: { "200": { description: "token+organizer" }, "401": { description: bad_credentials }, "403": { description: captcha_failed }, "423": { description: account_locked } }

  /api/v1/org/flows:
    get:
      tags: [organizer]
      summary: 列出本租户流程配置
      security: [{ bearer: [] }]
      responses: { "200": { description: ok } }
    post:
      tags: [organizer]
      summary: 新建流程配置（schema 经流程引擎校验）
      security: [{ bearer: [] }]
      requestBody:
        content: { application/json: { schema: { type: object, properties: { name: {type: string}, schema: {type: object} } } } }
      responses: { "201": { description: created }, "400": { description: flow_invalid } }

  /api/v1/org/events:
    get:
      tags: [organizer]
      summary: 列出本租户活动
      security: [{ bearer: [] }]
      responses: { "200": { description: ok } }
    post:
      tags: [organizer]
      summary: 新建活动（start<end，flow 须本租户）
      security: [{ bearer: [] }]
      requestBody:
        content: { application/json: { schema: { type: object, properties: { name: {type: string}, start_at: {type: string}, end_at: {type: string}, expected_count: {type: integer}, screen_template_code: {type: string}, flow_config_id: {type: string} } } } }
      responses: { "201": { description: created }, "400": { description: "bad_time/flow_not_owned" } }

  /api/v1/org/events/{id}:
    get:
      tags: [organizer]
      summary: 活动详情 + 实时签到数
      security: [{ bearer: [] }]
      parameters: [{ name: id, in: path, required: true, schema: {type: string} }]
      responses: { "200": { description: ok }, "404": { description: not_found } }
    put:
      tags: [organizer]
      summary: 更新活动（租户作用域）
      security: [{ bearer: [] }]
      parameters: [{ name: id, in: path, required: true, schema: {type: string} }]
      responses: { "200": { description: ok }, "404": { description: not_found } }

  /api/v1/org/events/{id}/status:
    post:
      tags: [organizer]
      summary: 设置活动状态 draft|active|ended
      security: [{ bearer: [] }]
      parameters: [{ name: id, in: path, required: true, schema: {type: string} }]
      responses: { "200": { description: ok } }

  /api/v1/org/events/{id}/entry:
    get:
      tags: [organizer]
      summary: 取入场链接 + event_token + mobile/screen URL
      security: [{ bearer: [] }]
      parameters: [{ name: id, in: path, required: true, schema: {type: string} }]
      responses: { "200": { description: ok } }

  /api/v1/org/events/{id}/participants:
    get:
      tags: [organizer]
      summary: 参与用户列表（含动态登记字段 Form + 签到位置）
      security: [{ bearer: [] }]
      parameters: [{ name: id, in: path, required: true, schema: {type: string} }]
      responses: { "200": { description: ok } }

  /api/v1/org/events/{id}/whitelist:
    get:
      tags: [organizer]
      summary: 白名单列表
      security: [{ bearer: [] }]
      parameters: [{ name: id, in: path, required: true, schema: {type: string} }]
      responses: { "200": { description: ok } }

  /api/v1/org/events/{id}/whitelist/import:
    post:
      tags: [organizer]
      summary: 白名单 CSV 导入（header employee_number,name,phone）
      security: [{ bearer: [] }]
      parameters: [{ name: id, in: path, required: true, schema: {type: string} }]
      requestBody: { content: { text/csv: { schema: { type: string } } } }
      responses: { "200": { description: "parsed/inserted" } }

  /api/v1/org/events/{id}/export:
    post:
      tags: [organizer]
      summary: 异步导出参与明细（NATS→CSV→对象存储；CSV 防公式注入）
      security: [{ bearer: [] }]
      parameters: [{ name: id, in: path, required: true, schema: {type: string} }]
      responses: { "202": { description: "job_id" } }

  /api/v1/org/exports/{job_id}:
    get:
      tags: [organizer]
      summary: 导出任务状态
      security: [{ bearer: [] }]
      parameters: [{ name: job_id, in: path, required: true, schema: {type: string} }]
      responses: { "200": { description: ok } }

  /api/v1/org/exports/{job_id}/download:
    get:
      tags: [organizer]
      summary: 下载导出 CSV（done 后）
      security: [{ bearer: [] }]
      parameters: [{ name: job_id, in: path, required: true, schema: {type: string} }]
      responses: { "200": { description: "text/csv" }, "409": { description: not_ready } }

  /api/v1/{adminSlug}/login:
    post:
      tags: [admin]
      summary: 超管登录（同登录硬化；adminSlug 见 /api/v1/p/config 之外的部署 env，默认 admin）
      requestBody:
        content: { application/json: { schema: { type: object, properties: { login_name: {type: string}, password: {type: string}, turnstile_token: {type: string} } } } }
      responses: { "200": { description: token }, "401": { description: bad_credentials }, "423": { description: account_locked } }

  /api/v1/{adminSlug}/organizers:
    get:
      tags: [admin]
      summary: 活动方列表
      security: [{ bearer: [] }]
      responses: { "200": { description: ok } }
    post:
      tags: [admin]
      summary: 新建活动方
      security: [{ bearer: [] }]
      responses: { "201": { description: created } }

  /api/v1/{adminSlug}/organizers/{id}/status:
    post:
      tags: [admin]
      summary: 启用/禁用活动方
      security: [{ bearer: [] }]
      parameters: [{ name: id, in: path, required: true, schema: {type: string} }]
      responses: { "200": { description: ok } }
