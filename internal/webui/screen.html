<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>寻道大千 · 周年庆典 · 公益联动大屏</title>
<style>
  :root{--ink:#2b3a3a;--cinnabar:#c0392b;--gold:#b8923c;--bamboo:#3f6e57;--cross:#e2231a}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:"Songti SC","STSong",serif;color:var(--ink);overflow:hidden;text-align:center;
    display:flex;flex-direction:column;align-items:center;justify-content:center}
  /* 水墨山水雾景背景（纯内嵌 SVG，离屏可用，不抢数字） */
  .ink-scene{position:fixed;inset:0;z-index:-2;
    background:linear-gradient(180deg,#eef5f1 0%,#e3eee9 42%,#dbe9e4 100%)}
  .ink-scene svg{position:absolute;inset:0;width:100%;height:100%}
  .scrim{position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:radial-gradient(circle at 50% 42%,rgba(255,255,255,.55),rgba(255,255,255,0) 55%)}
  .crane{animation:fly 26s linear infinite}
  @keyframes fly{from{transform:translateX(-6vw)}to{transform:translateX(106vw)}}
  .brand{font-size:clamp(24px,4vw,52px);letter-spacing:12px;color:var(--cinnabar);
    text-shadow:0 1px 0 rgba(255,255,255,.8)}
  .tag{margin-top:8px;font-size:clamp(13px,1.7vw,20px);color:#5d7a6b;letter-spacing:7px}
  .redcross{display:flex;align-items:center;gap:14px;margin:14px 0 2px;
    font-size:clamp(13px,1.6vw,19px);color:#566f60;letter-spacing:3px}
  .cross{width:34px;height:34px;position:relative;filter:drop-shadow(0 2px 5px rgba(226,35,26,.3));
    animation:beat 1.5s ease-in-out infinite}
  .cross::before,.cross::after{content:"";position:absolute;background:var(--cross);border-radius:3px}
  .cross::before{left:39%;top:0;width:22%;height:100%}
  .cross::after{top:39%;left:0;height:22%;width:100%}
  @keyframes beat{0%,100%{transform:scale(1)}50%{transform:scale(1.14)}}
  .hero{margin:2.4vh 0 .6vh}
  .hero .cap{font-size:clamp(15px,2.1vw,26px);letter-spacing:10px;color:var(--cross)}
  .heart{font-size:clamp(96px,21vw,250px);font-weight:700;line-height:1.02;
    color:var(--cinnabar);text-shadow:0 2px 0 rgba(255,255,255,.85),0 0 26px rgba(184,146,60,.3);
    font-variant-numeric:tabular-nums;font-feature-settings:"tnum";
    min-width:7ch;display:inline-block;will-change:contents}
  .sub{display:flex;gap:clamp(28px,7vw,90px);margin-top:2.2vh}
  .sub .cap{font-size:clamp(13px,1.5vw,19px);letter-spacing:6px;color:var(--bamboo)}
  .sub .val{font-size:clamp(34px,6vw,72px);font-weight:700;color:var(--ink);
    font-variant-numeric:tabular-nums;font-feature-settings:"tnum";min-width:5ch;display:inline-block}
  .note{margin-top:3vh;font-size:clamp(12px,1.4vw,18px);color:#6a6535;letter-spacing:2px}
  .note b{color:var(--cross)}
  .live{position:fixed;top:24px;right:32px;font-size:13px;color:#3f6e57;letter-spacing:3px}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:#3f6e57;
    margin-right:8px;box-shadow:0 0 8px rgba(63,110,87,.6);animation:b 1.4s infinite}
  @keyframes b{50%{opacity:.25}}
  .foot{position:fixed;bottom:18px;font-size:11px;color:#7e8c7f;letter-spacing:4px}
</style>
</head>
<body>
  <div class="ink-scene" aria-hidden="true">
    <svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
      <defs>
        <linearGradient id="m1" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#9fb7ad"/><stop offset="1" stop-color="#c3d6cd"/>
        </linearGradient>
        <radialGradient id="halo" cx="50%" cy="22%" r="40%">
          <stop offset="0" stop-color="#fff6df" stop-opacity=".75"/>
          <stop offset="1" stop-color="#fff6df" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <rect width="1600" height="900" fill="url(#halo)"/>
      <!-- 远山 -->
      <path d="M0 470 L210 360 360 430 540 330 720 440 900 350 1080 440 1280 340 1460 440 1600 380 1600 900 0 900Z"
            fill="#b9cdc4" opacity=".55"/>
      <!-- 雾带 -->
      <rect x="0" y="430" width="1600" height="170" fill="#eef5f1" opacity=".7"/>
      <!-- 中景山 + 楼阁意象 -->
      <path d="M120 600 L300 470 470 590 360 590 Z" fill="#7f9b91" opacity=".5"/>
      <path d="M1080 610 L1280 440 1500 600 1300 600 Z" fill="#6f8c82" opacity=".55"/>
      <rect x="1255" y="470" width="34" height="60" fill="#8aa39a" opacity=".5"/>
      <polygon points="1248,472 1296,472 1272,452" fill="#9bb0a7" opacity=".55"/>
      <!-- 近山 -->
      <path d="M0 760 L260 600 520 740 760 590 1040 760 1320 610 1600 740 1600 900 0 900Z"
            fill="url(#m1)" opacity=".75"/>
      <!-- 低云 -->
      <ellipse cx="430" cy="690" rx="360" ry="60" fill="#fff" opacity=".55"/>
      <ellipse cx="1180" cy="720" rx="420" ry="70" fill="#fff" opacity=".5"/>
      <!-- 仙鹤 -->
      <g class="crane" fill="none" stroke="#5b7167" stroke-width="3" stroke-linecap="round" opacity=".6">
        <path d="M520 250 q18 -14 36 0 q18 14 36 0"/>
        <path d="M610 285 q14 -11 28 0 q14 11 28 0"/>
        <path d="M470 320 q12 -9 24 0 q12 9 24 0"/>
      </g>
    </svg>
  </div>
  <div class="scrim" aria-hidden="true"></div>

  <div class="live"><span class="dot"></span><span id="st">连接中…</span></div>
  <div class="brand">寻道大千</div>
  <div class="tag">周 年 庆 典 · 公 益 联 动</div>
  <div class="redcross"><span class="cross"></span><span>携手 中国红十字会 · 以善入道</span></div>

  <div class="hero">
    <div class="cap">累 计 爱 心 值</div>
    <div class="heart" id="heart">0</div>
  </div>

  <div class="sub">
    <div><div class="cap">结缘道友</div><div class="val" id="people">0</div></div>
    <div><div class="cap">爱心捐赠</div><div class="val" id="rate">0<span style="font-size:.5em"> 元</span></div></div>
  </div>

  <div class="note">每位道友结缘，平台为 <b>中国红十字会</b> 捐出 <b>10 爱心值</b>（折公益捐赠 <b>1 元</b>），仙道同行</div>
  <div class="foot">国风水墨 · 仙途大千 · 实时公益大屏</div>
<script>
const eventId = location.pathname.split("/").filter(Boolean)[1];
const HEART_PER = 10;        // 每签到 1 人 = 10 爱心值
const YUAN_PER  = 1;         // 折合公益捐赠（元）
const heartEl = document.getElementById("heart");
const peopleEl = document.getElementById("people");
const rateEl = document.getElementById("rate");
const stEl = document.getElementById("st");
const fmt = n => Math.round(n).toLocaleString("en-US");

// 平滑补间：服务端 SSE ≤2/s 节流，客户端用 rAF 在两次快照间把数字滚上去，
// 避免大步跳变造成的卡顿（用户反馈）。每来新目标值即从当前显示值重定向动画。
function makeRoller(el, render){
  let cur = 0, from = 0, to = 0, t0 = 0, dur = 700, raf = 0;
  const ease = x => 1 - Math.pow(1 - x, 3);
  function tick(now){
    const p = Math.min(1, (now - t0) / dur);
    cur = from + (to - from) * ease(p);
    el.innerHTML = render(cur);
    if (p < 1) raf = requestAnimationFrame(tick); else raf = 0;
  }
  return target => {
    if (target === to) return;
    from = cur; to = target; t0 = performance.now();
    dur = Math.min(1600, 500 + Math.abs(to - from) * 0.6);
    if (!raf) raf = requestAnimationFrame(tick);
  };
}
const rollHeart  = makeRoller(heartEl,  v => fmt(v));
const rollPeople = makeRoller(peopleEl, v => fmt(v));
const rollRate   = makeRoller(rateEl,   v => fmt(v) + '<span style="font-size:.5em"> 元</span>');

function apply(count){
  rollPeople(count);
  rollHeart(count * HEART_PER);
  rollRate(count * YUAN_PER);
}

function connect(){
  const es = new EventSource(`/api/v1/p/e/${eventId}/stream`);
  es.onopen = () => stEl.textContent = "实时连接";
  es.onmessage = e => { try { const s = JSON.parse(e.data); apply(s.count|0); } catch(_){} };
  es.onerror = () => { stEl.textContent = "重连中…"; es.close(); setTimeout(connect, 2000); };
}
connect();
</script>
</body>
</html>
