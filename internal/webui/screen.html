<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>寻道大千周年庆公益大屏</title>
<style>
:root{
  --bg:#f5ebd3;--paper:#f8f0dd;--ink:#2f241c;--muted:#7d6553;--red:#C0392B;--gold:#C9A84C;
  --ring:1100;--ringLen:0;--w:100vw;--h:100vh;
}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#e9dcc2;color:var(--ink)}
body{
  font-family:"STSong","Songti SC","Noto Serif CJK SC",serif;
  background:
    radial-gradient(circle at 18% 22%,rgba(192,57,43,.10),transparent 18%),
    radial-gradient(circle at 82% 20%,rgba(201,168,76,.12),transparent 20%),
    radial-gradient(circle at 50% 72%,rgba(47,36,28,.06),transparent 26%),
    linear-gradient(180deg,#f4e8ce 0%,#f6efdd 38%,#efe3c7 100%);
}
.bg{
  position:fixed;inset:0;width:100%;height:100%;object-fit:cover;opacity:.22;mix-blend-mode:multiply;pointer-events:none;
}
.frame{
  position:relative;z-index:1;height:100%;padding:2.2vh 3.2vw 3.8vh;display:flex;flex-direction:column;justify-content:space-between;
}
.top{
  position:relative;display:flex;align-items:flex-start;justify-content:center;min-height:14vh;
}
.topbar{
  position:absolute;top:0;left:50%;transform:translateX(-50%);width:min(72vw,1380px);max-height:11vh;object-fit:contain;opacity:.92;
}
.title-wrap{
  margin-top:3.2vh;text-align:center;padding:1.4vh 2.2vw 0;max-width:78vw;
}
.eyebrow{
  font-size:min(1.4vw,28px);letter-spacing:.35em;color:var(--red);text-indent:.35em;text-transform:uppercase;
}
.title{
  margin:.8vh 0 0;font-family:"STKaiti","KaiTi",serif;font-size:min(3.5vw,68px);font-weight:700;letter-spacing:.08em;
}
.title::after{
  content:"";display:block;margin:1.1vh auto 0;width:min(28vw,520px);height:2px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,.25),var(--gold),rgba(201,168,76,.25),transparent);
}
.main{
  position:relative;flex:1;display:grid;place-items:center;
}
.halo{
  position:absolute;width:min(42vw,820px);aspect-ratio:1;border-radius:50%;
  background:
    radial-gradient(circle,rgba(255,255,255,.55) 0 22%,rgba(201,168,76,.13) 44%,rgba(201,168,76,0) 68%),
    radial-gradient(circle at 48% 48%,rgba(192,57,43,.08),transparent 62%);
  filter:none;pointer-events:none;
}
.ring{
  position:absolute;width:min(40vw,760px);aspect-ratio:1;transform:rotate(-90deg);overflow:visible;
}
.ring circle{fill:none}
.track{stroke:rgba(111,85,57,.14);stroke-width:10}
.progress{
  stroke:var(--gold);stroke-width:14;stroke-linecap:round;
  stroke-dasharray:var(--ring);stroke-dashoffset:calc(var(--ring) - var(--ringLen));
  transition:stroke-dashoffset .6s ease,opacity .6s ease;
}
.core{
  position:relative;display:flex;flex-direction:column;align-items:center;gap:1.1vh;text-align:center;
}
.label{
  font-family:"STKaiti","KaiTi",serif;font-size:min(2vw,36px);color:var(--muted);letter-spacing:.24em;text-indent:.24em;
}
.count{
  font-family:"SFMono-Regular","Roboto Mono","Consolas",monospace;font-variant-numeric:tabular-nums;
  font-size:min(20vw,320px);line-height:.9;color:var(--ink);text-shadow:0 .08em .18em rgba(255,250,238,.45);
}
.meta{
  display:flex;gap:min(5vw,88px);justify-content:center;flex-wrap:wrap;margin-top:1.2vh;color:var(--muted)
}
.stat{
  min-width:13vw;padding:.75vh 1.2vw;border-top:1px solid rgba(201,168,76,.34);border-bottom:1px solid rgba(192,57,43,.16);
  background:linear-gradient(90deg,rgba(255,255,255,.18),rgba(255,255,255,.04));
}
.stat b{
  display:block;margin-top:.2vh;font-size:min(2.3vw,42px);font-family:"SFMono-Regular","Roboto Mono","Consolas",monospace;color:var(--red)
}
.ink-zone{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.ink{
  position:absolute;left:50%;top:50%;width:26px;height:26px;border-radius:50%;
  background:radial-gradient(circle,rgba(192,57,43,.20),rgba(192,57,43,.10) 45%,rgba(47,36,28,.08) 62%,transparent 70%);
  border:1px solid rgba(47,36,28,.10);transform:translate(-50%,-50%) scale(.4);opacity:0;animation:ripple .9s ease-out forwards;
}
@keyframes ripple{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.35)}
  20%{opacity:.9}
  100%{opacity:0;transform:translate(-50%,-50%) scale(4.8)}
}
.bottom{
  display:flex;align-items:center;justify-content:center;gap:1.2vw;
  min-height:9vh;padding-top:1.2vh;border-top:1px solid rgba(201,168,76,.28);color:#6c5441;
  font-size:min(1.4vw,27px);letter-spacing:.08em;
}
.charity-logo{height:min(4.4vh,46px);object-fit:contain;opacity:.9}
.seal{
  position:absolute;right:4.4vw;bottom:11.5vh;width:min(9vw,170px);aspect-ratio:1;border:1px solid rgba(192,57,43,.28);
  color:rgba(192,57,43,.70);display:grid;place-items:center;font-family:"STKaiti","KaiTi",serif;font-size:min(1.8vw,32px);
  transform:rotate(-8deg);background:rgba(255,248,239,.16)
}
.qr-card{
  position:absolute;left:4.4vw;bottom:11vh;display:flex;flex-direction:column;align-items:center;
  gap:.7vh;padding:1.2vh 1.1vw;background:rgba(255,248,239,.82);
  border:1px solid rgba(201,168,76,.5);border-radius:8px;box-shadow:0 .4vh 1.4vh rgba(47,36,28,.12);
}
.qr-card img{width:min(11vw,164px);height:min(11vw,164px);image-rendering:pixelated;background:#fff;border-radius:4px}
.qr-card span{font-family:"STKaiti","KaiTi",serif;font-size:min(1.4vw,24px);color:var(--red);letter-spacing:.22em;text-indent:.22em}
@media (max-aspect-ratio: 16/9){
  .count{font-size:min(17vw,250px)}
  .meta{gap:3vw}
  .bottom{font-size:min(2vw,24px)}
  .qr-card img{width:min(16vw,150px);height:min(16vw,150px)}
}
</style>
</head>
<body>
<img class="bg" src="/assets/news-bg.png" alt="" onerror="this.style.display='none'">
<div class="frame">
  <header class="top">
    <img class="topbar" src="/assets/nav-top.png" alt="" onerror="this.style.display='none'">
    <div class="title-wrap">
      <div class="eyebrow">ANNIVERSARY · CHARITY</div>
      <h1 id="eventName" class="title">寻道大千周年庆</h1>
    </div>
  </header>
  <main class="main">
    <div class="halo"></div>
    <svg class="ring" viewBox="0 0 400 400" aria-hidden="true">
      <circle class="track" cx="200" cy="200" r="175"></circle>
      <circle id="progressCircle" class="progress" cx="200" cy="200" r="175"></circle>
    </svg>
    <section class="core" aria-live="polite">
      <div class="label">结缘道友</div>
      <div id="count" class="count">0</div>
      <div class="meta">
        <div class="stat">预计参与<b id="expected">0</b></div>
        <div class="stat">进度<b id="percent">0%</b></div>
      </div>
    </section>
    <div id="inkZone" class="ink-zone"></div>
  </main>
  <footer class="bottom">
    <span>本场公益由 广东省游心公益基金会 联合发起 · 以善入道</span>
    <img class="charity-logo" src="/assets/youxin-logo.png" alt="广东省游心公益基金会" onerror="this.style.display='none'">
  </footer>
  <div class="seal">寻道有善</div>
  <div class="qr-card">
    <img id="qrImg" alt="扫码签到" onerror="this.style.visibility='hidden'">
    <span>扫码签到</span>
  </div>
</div>
<script>
(() => {
  const eventId = location.pathname.split('/')[2] || "";
  const els = {
    name: document.getElementById("eventName"),
    count: document.getElementById("count"),
    expected: document.getElementById("expected"),
    percent: document.getElementById("percent"),
    inkZone: document.getElementById("inkZone"),
    circle: document.getElementById("progressCircle")
  };
  const C = 2 * Math.PI * 175;
  document.documentElement.style.setProperty("--ring", C.toFixed(2));
  // 扫码签到二维码：编码"当前域名 + 活动ID"的用户入场链接（服务端按请求域名生成）
  if (eventId) {
    const qi = document.getElementById("qrImg");
    if (qi) qi.src = "/api/v1/p/e/" + encodeURIComponent(eventId) + "/qr";
  }
  let expected = 0, target = 0, shown = 0, raf = 0, es = null, retry = 0, dead = false;

  function format(n){ return Math.max(0, n | 0).toLocaleString("zh-CN"); }
  function progressValue(count){
    if (!expected) return 0;
    return Math.min(count / ((expected * 0.9) || 1), 1);
  }
  function paintProgress(){
    const p = progressValue(target);
    document.documentElement.style.setProperty("--ringLen", (C * p).toFixed(2));
    els.percent.textContent = Math.round(p * 100) + "%";
  }
  function ripple(){
    const n = document.createElement("div");
    n.className = "ink";
    const dx = (Math.random() - .5) * 160;
    const dy = (Math.random() - .5) * 90;
    n.style.left = "calc(50% + " + dx.toFixed(0) + "px)";
    n.style.top = "calc(50% + " + dy.toFixed(0) + "px)";
    els.inkZone.appendChild(n);
    n.addEventListener("animationend", () => n.remove(), { once:true });
  }
  function tick(){
    const d = target - shown;
    if (Math.abs(d) < .35) {
      shown = target;
    } else {
      shown += d * .14;
      if (Math.abs(d) < 4) shown += Math.sign(d) * .18;
    }
    els.count.textContent = format(Math.round(shown));
    if (shown !== target) raf = requestAnimationFrame(tick);
    else raf = 0;
  }
  function animateTo(next){
    target = Math.max(0, Number(next) || 0);
    paintProgress();
    if (!raf) raf = requestAnimationFrame(tick);
  }
  function applyCount(next){
    const prev = target;
    animateTo(next);
    if (next > prev) ripple();
  }
  async function loadInfo(){
    const res = await fetch("/api/v1/p/e/" + encodeURIComponent(eventId) + "/info", { cache:"no-store" });
    if (!res.ok) throw new Error("info");
    const data = await res.json();
    els.name.textContent = data && data.name ? data.name : "寻道大千周年庆";
    expected = Math.max(0, Number(data && data.expected_count) || 0);
    els.expected.textContent = format(expected);
    paintProgress();
  }
  function connect(){
    if (dead || !eventId) return;
    es = new EventSource("/api/v1/p/e/" + encodeURIComponent(eventId) + "/stream");
    es.onmessage = (ev) => {
      let data;
      try { data = JSON.parse(ev.data); } catch (_) { return; }
      applyCount(Number(data && data.count) || 0);
    };
    es.onerror = () => {
      if (es) es.close();
      es = null;
      if (dead) return;
      clearTimeout(retry);
      retry = setTimeout(connect, 2000);
    };
  }
  function shutdown(){
    dead = true;
    if (raf) cancelAnimationFrame(raf);
    clearTimeout(retry);
    if (es) es.close();
  }
  window.addEventListener("beforeunload", shutdown, { once:true });
  paintProgress();
  loadInfo().catch(() => {
    els.name.textContent = "寻道大千周年庆";
    els.expected.textContent = "0";
    paintProgress();
  }).finally(connect);
})();
</script>
</body>
</html>
