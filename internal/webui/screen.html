<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>寻道大千 · 周年庆典 · 公益大屏</title>
<style>
/* ── 设计基调：亮色国风宣纸，水墨山水为底，朱砂+描金点缀 ── */
:root {
  --ink:       #2b3020;
  --cinnabar:  #c0392b;
  --crimson:   #e8251a;
  --gold:      #c8902a;
  --gold-lt:   #f0c860;
  --jade:      #3d6b5a;
  --paper:     #fdf6e8;
  --paper2:    #f5ead0;
  --mist:      rgba(253,246,232,.62);
  --ink-faint: rgba(43,48,32,.12);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box }
html, body { width:100%; height:100%; overflow:hidden }
body {
  font-family: "Songti SC","STSong","Noto Serif SC","SimSun",serif;
  color: var(--ink);
  background: var(--paper2);
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── 背景层 ── */
.bg-img {
  position: fixed; inset: 0; z-index: 0;
  background: var(--paper2) url("/assets/news-bg.png") center top / cover no-repeat;
}
/* 宣纸蒙层：让山水隐约透出，保证可读性 */
.bg-paper {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background: linear-gradient(
    180deg,
    rgba(253,246,232,.72) 0%,
    rgba(253,246,232,.50) 40%,
    rgba(253,246,232,.60) 75%,
    rgba(253,246,232,.80) 100%
  );
}
/* 中央辉光，让心形区域更通透 */
.bg-glow {
  position: fixed; inset: 0; z-index: 2; pointer-events: none;
  background: radial-gradient(ellipse 60% 55% at 50% 52%,
    rgba(255,255,255,.55) 0%,
    rgba(255,255,255,.0) 100%);
}

/* ── 粒子画布（祥云散粒，极淡） ── */
#particles { position:fixed; inset:0; z-index:3; pointer-events:none; opacity:.45 }

/* ── 顶部页眉条 ── */
.navtop {
  position: fixed; top:0; left:0; width:100%; z-index:10;
  pointer-events:none; object-fit:cover; height: clamp(60px,8.2vw,120px);
  opacity: .92;
}

/* ── 顶部活动名区域 ── */
.header {
  position: relative; z-index: 15;
  margin-top: clamp(52px,7vw,110px);
  display: flex; flex-direction:column; align-items:center;
  gap: 4px;
}
.event-name {
  font-size: clamp(26px,4.4vw,62px);
  font-weight: 700;
  letter-spacing: clamp(6px,1vw,16px);
  color: var(--cinnabar);
  text-shadow:
    0 1px 0 rgba(255,255,255,.9),
    0 2px 14px rgba(192,57,43,.35);
}
/* 描金边 */
.event-name::after {
  content: attr(data-text);
  position: absolute;
  inset: 0;
  -webkit-text-stroke: 1px var(--gold);
  color: transparent;
  pointer-events: none;
}
.event-name-wrap { position: relative }
.subtitle {
  font-size: clamp(12px,1.5vw,20px);
  letter-spacing: clamp(5px,.8vw,13px);
  color: var(--jade);
  text-shadow: 0 1px 0 rgba(255,255,255,.8);
}

/* ── 金色分割线（祥云纹） ── */
.divider {
  position: relative; z-index: 15;
  margin: clamp(6px,.8vh,14px) 0;
  display: flex; align-items: center; gap: 14px;
  width: clamp(260px,55vw,760px);
}
.divider::before, .divider::after {
  content: "";
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.divider-icon {
  font-size: clamp(14px,1.6vw,22px);
  color: var(--gold);
  line-height: 1;
  text-shadow: 0 0 8px rgba(200,144,42,.6);
}

/* ── 心形主体 ── */
.heart-section {
  position: relative; z-index: 15;
  display: flex; flex-direction:column; align-items:center;
}
.heartWrap {
  position: relative;
  width:  min(38vh, 44vw);
  height: min(38vh, 44vw);
  filter:
    grayscale(calc(1 - var(--p, 0)))
    brightness(calc(.52 + .60 * var(--p, 0)))
    saturate(calc(.3  + 1.4 * var(--p, 0)))
    drop-shadow(0 0 calc(10px + 70px * var(--p,0)) rgba(232,37,26, calc(.1 + .72*var(--p,0))))
    drop-shadow(0 0 calc(4px + 20px  * var(--p,0)) rgba(200,144,42, calc(.05 + .35*var(--p,0))));
  transition: filter 1.4s ease;
  transform-origin: 50% 55%;
}
/* 一次性心跳动画：弹性缓出 */
.beat { animation: heartbeat .70s cubic-bezier(.18,.72,.28,1) }
@keyframes heartbeat {
  0%   { transform: scale(1) }
  20%  { transform: scale(1.18) }
  42%  { transform: scale(.96) }
  64%  { transform: scale(1.09) }
  82%  { transform: scale(.99) }
  100% { transform: scale(1) }
}
/* 心形 SVG */
.heart-svg { width:100%; height:100%; display:block }
/* 进度百分比叠加在心形中央 */
.pct-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  padding-bottom: 8%;          /* 视觉居中微调 */
}
.pct-text {
  font-size: clamp(32px, 7vw, 92px);
  font-weight: 700;
  color: #fff;
  text-shadow:
    0 0 12px rgba(0,0,0,.55),
    0 2px 8px rgba(0,0,0,.40);
  font-variant-numeric: tabular-nums;
  letter-spacing: 2px;
  line-height: 1;
  transition: opacity .3s;
}

/* ── 数据面板 ── */
.stats-panel {
  position: relative; z-index: 15;
  margin-top: clamp(10px,1.6vh,22px);
  display: flex;
  gap: clamp(20px,5vw,72px);
  align-items: stretch;
}
.stat-card {
  background: rgba(253,246,232,.78);
  border: 1px solid rgba(200,144,42,.35);
  border-radius: 8px;
  padding: clamp(10px,1.4vh,20px) clamp(22px,3.2vw,52px);
  display: flex; flex-direction:column; align-items:center; gap:4px;
  box-shadow:
    0 2px 16px rgba(43,48,32,.10),
    inset 0 1px 0 rgba(255,255,255,.6);
  /* 淡雅描金边框 */
  position: relative;
}
.stat-card::before {
  content: "";
  position: absolute; inset:-1px; border-radius:9px;
  background: linear-gradient(135deg,
    rgba(200,144,42,.45) 0%,
    rgba(200,144,42,.08) 50%,
    rgba(200,144,42,.45) 100%);
  z-index:-1;
  pointer-events:none;
}
.stat-cap {
  font-size: clamp(11px, 1.3vw, 17px);
  letter-spacing: clamp(4px,.6vw,9px);
  color: var(--jade);
  white-space: nowrap;
}
.stat-val {
  font-size: clamp(34px, 5.8vw, 80px);
  font-weight: 700;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  line-height: 1;
  letter-spacing: 2px;
  text-shadow: 0 1px 0 rgba(255,255,255,.8);
  /* 数字渐变：朱砂色 */
  background: linear-gradient(175deg, #3a1e0e 0%, var(--cinnabar) 60%, var(--gold) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ── 公益署名 ── */
.charity {
  position: relative; z-index: 15;
  margin-top: clamp(8px,1.4vh,18px);
  display: flex; align-items: center; gap: 10px;
  font-size: clamp(11px,1.25vw,17px);
  color: #5a6b50;
  letter-spacing: 2px;
}
.charity img {
  height: clamp(22px,2.6vw,36px);
  width: auto;
}
.charity-name { color: var(--cinnabar); font-weight:700 }

/* ── 底部装饰 ── */
.foot {
  position: fixed; bottom:12px; left:50%; transform:translateX(-50%);
  z-index: 15;
  font-size: clamp(10px,.9vw,13px);
  color: #8a9080;
  letter-spacing: 5px;
  white-space: nowrap;
}

/* ── 实时状态指示 ── */
.live-badge {
  position: fixed; top: clamp(16px,2.2vw,30px); right: clamp(16px,2vw,32px);
  z-index: 20;
  display: flex; align-items:center; gap:7px;
  font-size: clamp(11px,1.1vw,15px);
  color: var(--jade);
  letter-spacing: 3px;
  background: rgba(253,246,232,.72);
  border: 1px solid rgba(61,107,90,.25);
  border-radius: 20px;
  padding: 5px 14px 5px 10px;
}
.live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--jade);
  box-shadow: 0 0 7px rgba(61,107,90,.7);
  animation: pulse-dot 1.6s ease-in-out infinite;
}
@keyframes pulse-dot { 50% { opacity:.22; box-shadow:none } }

/* ── 祥云装饰线（顶部、底部） ── */
.cloud-strip-t, .cloud-strip-b {
  position: fixed; left:0; width:100%; z-index:8; pointer-events:none;
}
.cloud-strip-t { top: clamp(55px,7.5vw,115px) }
.cloud-strip-b { bottom: 28px }
.cloud-line {
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(200,144,42,.40) 20%, rgba(200,144,42,.40) 80%, transparent 100%);
}
</style>
</head>
<body>

<!-- 背景层 -->
<div class="bg-img" aria-hidden="true"></div>
<div class="bg-paper" aria-hidden="true"></div>
<div class="bg-glow" aria-hidden="true"></div>
<canvas id="particles" aria-hidden="true"></canvas>

<!-- 顶部页眉条 -->
<img class="navtop" src="/assets/nav-top.png" alt="" onerror="this.style.opacity='0'">

<!-- 顶部装饰线 -->
<div class="cloud-strip-t"><div class="cloud-line"></div></div>

<!-- 实时状态 -->
<div class="live-badge">
  <span class="live-dot"></span>
  <span id="live-st">连接中…</span>
</div>

<!-- ── 活动名 ── -->
<div class="header">
  <div class="event-name-wrap">
    <div class="event-name" id="event-name" data-text="寻道大千">寻道大千</div>
  </div>
  <div class="subtitle">周 年 庆 典 &nbsp;·&nbsp; 公 益 同 行</div>
</div>

<!-- 分割线 -->
<div class="divider"><span class="divider-icon">✦</span></div>

<!-- ── 心形主角 ── -->
<div class="heart-section">
  <div class="heartWrap" id="heartWrap">
    <svg class="heart-svg" id="heart-svg" viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- 玉/朱砂渐变：p=0 时偏灰玉，p=1 时朱砂鲜红 -->
        <linearGradient id="hg" x1="30%" y1="0%" x2="70%" y2="100%">
          <stop offset="0%"   stop-color="#f0c8c0"/>
          <stop offset="40%"  stop-color="#e8251a"/>
          <stop offset="100%" stop-color="#8b0000"/>
        </linearGradient>
        <!-- 描金边：随进度从淡到亮 -->
        <linearGradient id="stroke-g" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#f0c860"/>
          <stop offset="50%"  stop-color="#c8902a"/>
          <stop offset="100%" stop-color="#f0c860"/>
        </linearGradient>
        <!-- 内嵌光晕滤镜 -->
        <filter id="inner-glow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
      </defs>
      <!-- 心形主体 -->
      <path id="heart-path"
        fill="url(#hg)"
        stroke="url(#stroke-g)"
        stroke-width="1.4"
        d="M50 82
           C50 82 5 52 5 28
           C5 14 15 5 27 5
           C35 5 43 10 50 18
           C57 10 65 5 73 5
           C85 5 95 14 95 28
           C95 52 50 82 50 82 Z"/>
      <!-- 内嵌高光（左上，玉感） -->
      <ellipse cx="35" cy="28" rx="10" ry="7"
        fill="rgba(255,255,255,.30)"
        transform="rotate(-20,35,28)"/>
      <!-- 中心「缘」字（可选，克制） -->
      <text x="50" y="52"
        text-anchor="middle"
        font-family="'Songti SC','STSong',serif"
        font-size="22"
        font-weight="700"
        fill="rgba(255,255,255,.82)"
        filter="url(#inner-glow)"
        letter-spacing="1">缘</text>
    </svg>
    <div class="pct-overlay">
      <div class="pct-text" id="pct-el">0%</div>
    </div>
  </div>
</div>

<!-- 分割线 -->
<div class="divider"><span class="divider-icon">❧</span></div>

<!-- ── 数据面板 ── -->
<div class="stats-panel">
  <div class="stat-card">
    <div class="stat-cap">结 缘 道 友</div>
    <div class="stat-val" id="count-el">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-cap">预 计 参 与</div>
    <div class="stat-val" id="exp-el">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-cap">结 缘 进 度</div>
    <div class="stat-val" id="prog-el">0%</div>
  </div>
</div>

<!-- ── 公益署名 ── -->
<div class="charity">
  <img id="charity-logo" src="/assets/youxin-logo.png" alt="游心公益"
       onerror="this.style.display='none'">
  <span>本场公益由 <span class="charity-name">广东省游心公益基金会</span> 联合发起 · 以善入道</span>
</div>

<!-- 底部装饰线 -->
<div class="cloud-strip-b"><div class="cloud-line"></div></div>

<!-- 底部版权 -->
<div class="foot">国 风 水 墨 &nbsp;·&nbsp; 仙 途 大 千 &nbsp;·&nbsp; 实 时 公 益 大 屏</div>

<script>
'use strict';
/* ─── 工具 ─── */
const $ = id => document.getElementById(id);

/* ─── 元素引用 ─── */
const heartWrap = $('heartWrap');
const pctEl     = $('pct-el');
const countEl   = $('count-el');
const expEl     = $('exp-el');
const progEl    = $('prog-el');
const liveStEl  = $('live-st');
const eventNameEl = $('event-name');

/* ─── 状态 ─── */
const eventId = location.pathname.split('/').filter(Boolean)[1] || '';
let expected  = 0;
let last      = -1;          // 上一次 count，-1 = 尚未初始化

/* ─── 数字缓动渲染 ─── */
// displayCount 是当前屏幕显示值（可浮点），targetCount 是目标
let displayCount = 0;
let targetCount  = 0;
let rafId = null;

function animCount() {
  const diff = targetCount - displayCount;
  if (Math.abs(diff) < 0.5) {
    displayCount = targetCount;
    renderDisplay(targetCount);
    rafId = null;
    return;
  }
  // 指数缓动：每帧靠近 12%
  displayCount += diff * 0.12;
  renderDisplay(Math.round(displayCount));
  rafId = requestAnimationFrame(animCount);
}

function setTarget(c) {
  targetCount = c;
  if (!rafId) rafId = requestAnimationFrame(animCount);
}

function renderDisplay(c) {
  countEl.textContent = c.toLocaleString('zh-CN');
}

/* ─── 进度计算 ─── */
function progress(count) {
  if (!expected) return 0;
  return Math.max(0, Math.min(1, count / (expected * 0.9)));
}

/* ─── 渲染（亮度+进度文字） ─── */
let currentP = 0;
let pRafId   = null;
let targetP  = 0;

function animP() {
  const diff = targetP - currentP;
  if (Math.abs(diff) < 0.001) {
    currentP = targetP;
    applyP(currentP);
    pRafId = null;
    return;
  }
  currentP += diff * 0.06;
  applyP(currentP);
  pRafId = requestAnimationFrame(animP);
}

function applyP(p) {
  heartWrap.style.setProperty('--p', p.toFixed(4));
  pctEl.textContent  = Math.round(p * 100) + '%';
  progEl.textContent = Math.round(p * 100) + '%';
}

function setP(p) {
  targetP = p;
  if (!pRafId) pRafId = requestAnimationFrame(animP);
}

/* ─── 心跳 Beat（一次性，count 增大时触发） ─── */
function beat() {
  heartWrap.classList.remove('beat');
  void heartWrap.offsetWidth;  // 强制重排，重置动画
  heartWrap.classList.add('beat');
}

/* ─── /info 拉取 ─── */
async function loadInfo() {
  try {
    const r = await fetch(`/api/v1/p/e/${eventId}/info`);
    const j = await r.json();
    const name = (j.name || '').trim();
    if (name) {
      eventNameEl.textContent = name;
      eventNameEl.dataset.text = name;
    }
    expected = (j.expected_count | 0);
    expEl.textContent = expected > 0 ? expected.toLocaleString('zh-CN') : '—';
  } catch (_) { /* 网络异常静默降级 */ }
}

/* ─── SSE 连接（稳健重连，无 setInterval 泄漏） ─── */
let esRef = null;
let reconnectTimer = null;

function connect() {
  if (esRef) { esRef.close(); esRef = null; }
  clearTimeout(reconnectTimer);

  const es = new EventSource(`/api/v1/p/e/${eventId}/stream`);
  esRef = es;

  es.onopen = () => { liveStEl.textContent = '实时连接' };

  es.onmessage = ev => {
    try {
      const s = JSON.parse(ev.data);
      const c = s.count | 0;
      if (last >= 0 && c > last) beat();   // 有新签到 → 爱心跳一下
      last = c;
      setTarget(c);
      setP(progress(c));
    } catch (_) {}
  };

  es.onerror = () => {
    liveStEl.textContent = '重连中…';
    es.close();
    esRef = null;
    reconnectTimer = setTimeout(connect, 2000);
  };
}

/* ─── 粒子（祥云散粒，GPU 友好，极淡） ─── */
(function initParticles() {
  const canvas = $('particles');
  const ctx = canvas.getContext('2d');
  let W, H;
  const PARTICLES = 55;
  const pts = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // 初始化粒子
  for (let i = 0; i < PARTICLES; i++) {
    pts.push({
      x:  Math.random() * 1.0,
      y:  Math.random() * 1.0,
      r:  1.5 + Math.random() * 2.5,
      vx: (Math.random() - .5) * 0.00015,
      vy: -0.00005 - Math.random() * 0.00010,
      a:  Math.random() * Math.PI * 2,
      gold: Math.random() > .6,
    });
  }

  function drawFrame() {
    ctx.clearRect(0, 0, W, H);
    for (const p of pts) {
      p.x = (p.x + p.vx + 1) % 1;
      p.y = (p.y + p.vy + 1) % 1;
      const px = p.x * W, py = p.y * H;
      ctx.beginPath();
      ctx.arc(px, py, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.gold
        ? 'rgba(200,144,42,.28)'
        : 'rgba(192,57,43,.22)';
      ctx.fill();
    }
    requestAnimationFrame(drawFrame);
  }
  drawFrame();
})();

/* ─── 启动 ─── */
loadInfo().then(connect);
</script>
</body>
</html>
