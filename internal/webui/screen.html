<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>寻道大千 · 周年庆典 · 公益大屏</title>
<style>
  :root{--ink:#2b3a3a;--cinnabar:#c0392b;--gold:#b8923c;--bamboo:#3f6e57}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:"Songti SC","STSong",serif;color:var(--ink);overflow:hidden;text-align:center;
    display:flex;flex-direction:column;align-items:center;justify-content:center}
  .scene{position:fixed;inset:0;z-index:-2;background:#e3eee9
    url("/assets/news-bg.png") center top/cover no-repeat}
  .scrim{position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:radial-gradient(circle at 50% 46%,rgba(255,255,255,.6),rgba(255,255,255,.16) 60%)}
  .navtop{position:fixed;top:0;left:0;width:100%;z-index:1;opacity:.96;pointer-events:none}
  .brand{font-size:clamp(22px,3.6vw,46px);letter-spacing:12px;color:var(--cinnabar);
    text-shadow:0 1px 0 rgba(255,255,255,.8)}
  .tag{margin-top:6px;font-size:clamp(12px,1.6vw,19px);color:#5d7a6b;letter-spacing:7px}

  /* 爱心：亮度=进度；每次签到跳动一下 */
  .heartWrap{margin:2.2vh 0 1vh;position:relative;width:min(46vh,52vw);height:min(46vh,52vw)}
  .heart{width:100%;height:100%;display:block;
    /* --p: 0..1 进度（count / (expected*0.9)）。控制亮度/饱和/光晕 */
    filter:grayscale(calc(1 - var(--p,0))) brightness(calc(.55 + .6*var(--p,0)))
           drop-shadow(0 0 calc(8px + 60px*var(--p,0)) rgba(224,35,26,calc(.15 + .65*var(--p,0))));
    transition:filter 1.2s ease;transform-origin:50% 55%}
  .beat{animation:beat .62s cubic-bezier(.2,.7,.3,1)}
  @keyframes beat{0%{transform:scale(1)}22%{transform:scale(1.16)}44%{transform:scale(.97)}
    66%{transform:scale(1.07)}100%{transform:scale(1)}}
  .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:clamp(34px,7vw,84px);font-weight:700;color:#fff;
    text-shadow:0 2px 10px rgba(0,0,0,.35);font-variant-numeric:tabular-nums}

  .stats{display:flex;gap:clamp(26px,7vw,84px);margin-top:1.4vh}
  .stats .cap{font-size:clamp(12px,1.4vw,18px);letter-spacing:6px;color:var(--bamboo)}
  .stats .val{font-size:clamp(28px,5vw,60px);font-weight:700;color:var(--ink);
    font-variant-numeric:tabular-nums}
  .charity{margin-top:2.4vh;display:flex;align-items:center;gap:12px;
    font-size:clamp(12px,1.4vw,18px);color:#5d6f5f;letter-spacing:2px}
  .charity img{height:clamp(26px,3vw,40px);width:auto}
  .live{position:fixed;top:22px;right:30px;font-size:13px;color:#3f6e57;letter-spacing:3px}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:#3f6e57;
    margin-right:8px;box-shadow:0 0 8px rgba(63,110,87,.6);animation:b 1.4s infinite}
  @keyframes b{50%{opacity:.25}}
  .foot{position:fixed;bottom:16px;font-size:11px;color:#7e8c7f;letter-spacing:4px}
</style>
</head>
<body>
  <div class="scene" aria-hidden="true"></div>
  <div class="scrim" aria-hidden="true"></div>
  <img class="navtop" src="/assets/nav-top.png" alt="">

  <div class="live"><span class="dot"></span><span id="st">连接中…</span></div>
  <div class="brand">寻道大千</div>
  <div class="tag">周 年 庆 典 · 公 益 同 行</div>

  <div class="heartWrap">
    <svg class="heart" id="heart" viewBox="0 0 32 29" xmlns="http://www.w3.org/2000/svg">
      <path fill="#e2231a" d="M23.6 0c-2.9 0-5.6 1.6-7.6 4.2C14 1.6 11.3 0 8.4 0 3.8 0 0 3.8 0 8.5
        c0 7 7.6 12.6 16 20.5 8.4-7.9 16-13.5 16-20.5C32 3.8 28.2 0 23.6 0z"/>
    </svg>
    <div class="pct" id="pct">0%</div>
  </div>

  <div class="stats">
    <div><div class="cap">结缘道友</div><div class="val" id="people">0</div></div>
    <div><div class="cap">预计参与</div><div class="val" id="exp">—</div></div>
  </div>

  <div class="charity">
    <img id="clogo" src="/assets/youxin-logo.png" alt="" onerror="this.style.display='none'">
    <span>本场公益由 <b style="color:#c0392b">广东省游心公益基金会</b> 联合发起 · 以善入道</span>
  </div>
  <div class="foot">国风水墨 · 仙途大千 · 实时公益大屏</div>
<script>
const eventId = location.pathname.split("/").filter(Boolean)[1];
const heart = document.getElementById("heart");
const pctEl = document.getElementById("pct");
const peopleEl = document.getElementById("people");
const expEl = document.getElementById("exp");
const stEl = document.getElementById("st");
let expected = 0, last = 0;

// 进度 = count / (expected * 90%)，到 90% 预计人数时爱心最亮
function progress(count){
  if (!expected) return 0;
  return Math.max(0, Math.min(1, count / (expected * 0.9)));
}
function render(count){
  const p = progress(count);
  heart.style.setProperty("--p", p.toFixed(4));
  pctEl.textContent = Math.round(p * 100) + "%";
  peopleEl.textContent = count.toLocaleString("en-US");
}
function beat(){
  heart.classList.remove("beat");
  void heart.offsetWidth;          // 重置动画
  heart.classList.add("beat");
}

async function loadInfo(){
  try{
    const r = await fetch(`/api/v1/p/e/${eventId}/info`);
    const j = await r.json();
    expected = j.expected_count | 0;
    expEl.textContent = expected ? expected.toLocaleString("en-US") : "—";
  }catch(_){}
}
function connect(){
  const es = new EventSource(`/api/v1/p/e/${eventId}/stream`);
  es.onopen = () => stEl.textContent = "实时连接";
  es.onmessage = e => {
    try{
      const s = JSON.parse(e.data);
      const c = s.count | 0;
      if (c > last) beat();        // 有新签到 → 爱心跳动一下
      last = c;
      render(c);
    }catch(_){}
  };
  es.onerror = () => { stEl.textContent="重连中…"; es.close(); setTimeout(connect,2000); };
}
loadInfo().then(connect);
</script>
</body>
</html>
